name: OnPurposePlannerNative
options:
  bundleIdPrefix: com.dustinschaaf
  deploymentTarget:
    iOS: "17.0"

targets:
  OnPurposePlannerNative:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: OnPurposePlannerNative
    info:
      path: OnPurposePlannerNative/Info.plist
      properties:
        CFBundleDisplayName: OnPurpose Planner
        UIApplicationSupportsIndirectInputEvents: true
        UILaunchScreen: {}
        UIRequiresFullScreen: true
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dustinschaaf.onpurposeplanner.native
        TARGETED_DEVICE_FAMILY: 2
        SWIFT_VERSION: 5.10
        GENERATE_INFOPLIST_FILE: NO
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"

schemes:
  OnPurposePlannerNative:
    build:
      targets:
        OnPurposePlannerNative: all
    run:
      config: Debug
